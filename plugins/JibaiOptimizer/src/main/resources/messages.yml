# =====================================================================
# JibaiOptimizer 消息文件
# 支持 MiniMessage 标签（如 <green>、<gold>）以及传统 & 颜色符号（如 &a、&c）。
# 占位符用 {} 包裹，例如 {tps}、{used}、{percent}。
# =====================================================================

prefix: "<green>[服务器优化]</green> "

no-permission: "<red>你没有权限使用这个指令。</red>"
reload-success: "<green>配置已重载。</green>"
unknown-command: "<red>未知指令，请使用 /optimizer status 查看状态。</red>"
players-only: "<red>该指令只能由玩家执行。</red>"
plugin-disabled: "<red>插件当前处于禁用状态（settings.enabled=false）。</red>"

# 作者信息：作为页脚追加在每个统计信息末尾
author-footer: "<dark_gray>——————————</dark_gray> <gray>插件作者: <aqua>即白</aqua> <dark_gray>·</dark_gray> <gray>JibaiOptimizer v1.0.0</gray>"

help:
  header: "<gold>JibaiOptimizer 指令帮助</gold>"
  status: "<yellow>/optimizer status <gray>- 查看服务器性能状态</gray></yellow>"
  memory: "<yellow>/optimizer memory <gray>- 查看内存占用</gray></yellow>"
  entities: "<yellow>/optimizer entities <gray>- 查看实体统计</gray></yellow>"
  chunks: "<yellow>/optimizer chunks <gray>- 查看区块统计</gray></yellow>"
  clean: "<yellow>/optimizer clean <gray>- 手动执行一次低风险优化</gray></yellow>"
  redstone: "<yellow>/optimizer redstone <gray>- 查看红石高频统计</gray></yellow>"
  hoppers: "<yellow>/optimizer hoppers <gray>- 查看漏斗统计</gray></yellow>"
  reload: "<yellow>/optimizer reload <gray>- 重载配置文件</gray></yellow>"

status:
  header: "<gold>========== 服务器性能状态 ==========</gold>"
  tps: "<yellow>TPS: <white>{tps}</white></yellow>"
  mspt: "<yellow>MSPT: <white>{mspt}</white></yellow>"
  players: "<yellow>在线玩家: <white>{players}</white></yellow>"
  worlds: "<yellow>世界数量: <white>{worlds}</white></yellow>"
  memory: "<yellow>内存: <white>{used}MB / {max}MB ({percent}%)</white></yellow>"
  entities: "<yellow>实体数量: <white>{entities}</white></yellow>"
  items: "<yellow>掉落物: <white>{items}</white></yellow>"
  orbs: "<yellow>经验球: <white>{orbs}</white></yellow>"
  chunks: "<yellow>加载区块: <white>{chunks}</white></yellow>"

memory:
  header: "<gold>========== 内存占用 ==========</gold>"
  used: "<yellow>已用内存: <white>{used}MB</white></yellow>"
  max: "<yellow>最大内存: <white>{max}MB</white></yellow>"
  free: "<yellow>空闲内存: <white>{free}MB</white></yellow>"
  percent: "<yellow>使用百分比: <white>{percent}%</white></yellow>"
  warning: "<yellow>服务器内存占用较高：{percent}% ({used}MB / {max}MB)</yellow>"
  critical: "<red>服务器内存占用过高：{percent}% ({used}MB / {max}MB)</red>"
  gc-done: "<gray>已执行一次强制 GC。</gray>"

entities:
  header: "<gold>========== 实体统计 ==========</gold>"
  world-line: "<yellow>世界 <white>{world}</white>: 实体 <white>{entities}</white> | 怪物 <white>{monsters}</white> | 动物 <white>{animals}</white> | 掉落物 <white>{items}</white></yellow>"
  total: "<gold>总实体数量: <white>{entities}</white></gold>"

chunks:
  header: "<gold>========== 区块统计 ==========</gold>"
  world-line: "<yellow>世界 <white>{world}</white>: 加载区块 <white>{chunks}</white></yellow>"
  total: "<gold>总加载区块: <white>{chunks}</white></gold>"
  warning: "<red>加载区块数量过多：{chunks}（阈值 {threshold}）</red>"

optimizer:
  started: "<yellow>检测到服务器压力过高，正在执行自动优化。</yellow>"
  finished: "<green>自动优化完成：清理掉落物 {items} 个，经验球 {orbs} 个，合并掉落物 {merged} 组。</green>"
  cooldown: "<gray>自动优化仍在冷却中，暂不重复执行。</gray>"
  manual-done: "<green>手动优化完成：清理掉落物 {items} 个，经验球 {orbs} 个，合并掉落物 {merged} 组。</green>"

redstone:
  header: "<gold>========== 红石高频统计 ==========</gold>"
  line: "<yellow>区块 <white>{chunk}</white>: 事件次数 <white>{count}</white></yellow>"
  empty: "<gray>当前窗口内没有检测到红石高频区块。</gray>"
  warning: "<red>检测到区块 {chunk} 红石频率过高，触发次数：{count}</red>"
  broken: "<red>[红石保护] 已破坏区块 {chunk} 的高频红石方块（{material}）。此为危险动作，仅在你显式开启 break-blocks 时才会发生。</red>"

hopper:
  header: "<gold>========== 漏斗统计 ==========</gold>"
  line: "<yellow>区块 <white>{chunk}</white>: 漏斗数量 <white>{count}</white></yellow>"
  empty: "<gray>当前没有超过阈值的漏斗密集区块。</gray>"
  no-cache: "<gray>漏斗扫描尚未完成第一轮，请稍后再试（后台正在分批扫描）。</gray>"
  warning: "<red>检测到区块 {chunk} 漏斗数量过多：{count}</red>"

spawn:
  limited: "<yellow>服务器压力较高，已临时限制部分实体生成。</yellow>"

# 启动 / 关闭横幅（控制台，使用 Bukkit ChatColor 上色，避免 ANSI 乱码）
startup:
  banner-line: "<green>==============================</green>"
  banner-name: "<aqua>JibaiOptimizer 已启动</aqua>"
  banner-author: "<yellow>作者: 即白</yellow>"
  banner-email: "<gold>邮箱: jibai0517@gamil.com</gold>"
  banner-version: "<gray>版本: {version}</gray>"
  banner-status: "<green>状态: 已启动</green>"
  shutdown: "<red>JibaiOptimizer 已关闭。</red>"
