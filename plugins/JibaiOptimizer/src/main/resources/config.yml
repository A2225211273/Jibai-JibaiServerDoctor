# =====================================================================
# JibaiOptimizer 主配置文件
# 作者：即白
# 说明：所有阈值、开关、间隔均可在此调整。修改后使用 /optimizer reload 生效。
# =====================================================================

settings:
  # 插件总开关。设为 false 时所有监控与优化任务停止。
  enabled: true
  # 语言（当前仅用于标识，实际文本在 messages.yml 中）
  language: zh_CN

# ---------------------------------------------------------------------
# 性能监控：定时采集服务器运行数据
# ---------------------------------------------------------------------
monitor:
  # 轻量采集间隔（秒）：只读内存与近似 TPS/MSPT，不遍历实体，开销极小。
  interval-seconds: 10
  # 历史快照保留数量（用于将来扩展，如平均值统计）
  history-size: 60
  # 全量扫描间隔（秒）：分批遍历实体与区块统计数量。比轻量采集低频，避免大服卡顿。
  full-scan-interval-seconds: 60
  # 全量扫描时每 tick 最多处理的世界数量，分批推进避免单 tick 卡顿。
  max-worlds-per-tick: 1
  # 预留：单 tick 最多扫描的区块数量（当前按世界为单位分批，保留以便将来更细粒度分批）。
  max-chunks-per-tick: 2000

# ---------------------------------------------------------------------
# 自动优化：压力过高时自动执行低风险优化
# ---------------------------------------------------------------------
auto-optimizer:
  enabled: true
  # 两次自动优化之间的最小冷却时间（秒），避免频繁执行
  cooldown-seconds: 120
  trigger:
    # 任一条件满足即触发（且不在冷却中）
    tps-below: 18.5
    # MSPT 为“近似每 tick 间隔”，正常约 50ms。阈值设为 55 避免健康服务器（50ms）误触发。
    mspt-above: 55
    memory-percent-above: 85
  actions:
    cleanup-dropped-items: true
    cleanup-exp-orbs: true
    # 自动优化时只做“轻量合并”（按处理上限分批），不做全服大规模合并，避免反向卡服。
    merge-nearby-items: true
    limit-spawn: true
    notify-admins: true

# ---------------------------------------------------------------------
# 内存监控
# ---------------------------------------------------------------------
memory:
  # 内存使用百分比告警阈值
  warning-percent: 85
  critical-percent: 92
  # 强制 GC —— 默认关闭！强制 GC 可能造成服务器卡顿。
  force-gc:
    enabled: false
    threshold-percent: 92
    cooldown-seconds: 600

# ---------------------------------------------------------------------
# 实体数量控制
# ---------------------------------------------------------------------
entity-control:
  enabled: true
  # 说明（重要）：以下 max-*-per-chunk 目前【仅用于统计与展示参考】，
  # entity-control 本身不会主动清理或删除实体，避免误删玩家的重要实体。
  # 真正的“怪物数量控制”由下方 spawn-limiter（仅限制自然刷怪）实现；
  # 掉落物按年龄清理由 item-optimizer 实现；经验球超量清理由 exp-orb-optimizer 实现。
  max-entities-per-chunk: 80    # 仅统计参考，不执行清理
  max-monsters-per-chunk: 40    # 仅统计参考，实际限制见 spawn-limiter
  max-animals-per-chunk: 50     # 仅统计参考，实际限制见 spawn-limiter
  max-items-per-chunk: 100      # 仅统计参考，不执行清理
  # 受保护实体：判断实体是否受保护时的依据（默认不会因为本插件被清理）
  protect:
    named-entities: true
    tamed-animals: true
    villagers: true
    item-frames: true
    armor-stands: true

# ---------------------------------------------------------------------
# 掉落物优化
# ---------------------------------------------------------------------
item-optimizer:
  enabled: true
  # 掉落物存在超过此秒数才可被清理
  cleanup-age-seconds: 180
  protect-near-player:
    enabled: true
    # 玩家半径内的掉落物受保护
    radius: 8
  merge-nearby-items:
    enabled: true
    # 合并此半径内相同类型的掉落物
    radius: 3
    # 合并安全说明：
    # - 合并严格遵守物品最大堆叠上限，超出部分会保留在其它掉落物上，绝不吞物品，合并前后总数不变。
    # - 合并按“区块分组”处理，不做全世界两两比较，避免物品过多时卡服。
    # 手动 /optimizer clean 时的处理上限（较大，但仍受限以防卡顿）
    max-items-per-run: 3000
    max-chunks-per-run: 200
    # 自动优化触发时的轻量合并上限（更保守，避免卡顿时雪上加霜）
    auto-max-items-per-run: 800
    auto-max-chunks-per-run: 40

# ---------------------------------------------------------------------
# 经验球优化
# ---------------------------------------------------------------------
exp-orb-optimizer:
  enabled: true
  max-orbs-per-chunk: 30
  cleanup-when-over-limit: true

# ---------------------------------------------------------------------
# 区块监控
# ---------------------------------------------------------------------
chunk-monitor:
  enabled: true
  # 加载区块总数超过此值时提醒管理员
  warning-loaded-chunks: 8000
  # 强制卸载区块 —— 默认关闭！可能影响玩家体验和其他插件。
  force-unload:
    enabled: false

# ---------------------------------------------------------------------
# 红石高频检测
# ---------------------------------------------------------------------
redstone-monitor:
  enabled: true
  # 统计时间窗口（秒）
  check-window-seconds: 10
  # 单区块在窗口内的红石事件阈值
  max-events-per-chunk: 300
  # 动作：warn（仅提醒） / cancel（尝试取消红石变化，不破坏方块） / break（破坏红石元件）
  # 默认必须是 warn，不破坏红石。
  action: warn
  # 【危险功能】破坏红石方块。默认关闭。
  # 只有当 action=break 且 break-blocks.enabled=true 时，才会真正破坏方块，
  # 且仅破坏 materials 白名单中的材质，绝不破坏其它方块（保护玩家建筑）。
  # 任何破坏都会记录控制台日志并提醒管理员。请谨慎开启。
  break-blocks:
    enabled: false
    materials:
      - REDSTONE_WIRE
      - REPEATER
      - COMPARATOR
      - OBSERVER

# ---------------------------------------------------------------------
# 漏斗监控
# ---------------------------------------------------------------------
hopper-monitor:
  enabled: true
  max-hoppers-per-chunk: 64
  # 扫描间隔（秒），不能太频繁
  scan-interval-seconds: 300
  # 分批扫描：每个扫描 tick 最多处理的区块数，避免一次性遍历全部已加载区块造成卡顿
  max-chunks-per-scan-tick: 100
  # 缓存过期时间（秒）：/optimizer hoppers 读取最近一次扫描缓存，超过此时长视为过期（仅用于提示）
  cache-expire-seconds: 600
  # 漏斗监控只提醒，不破坏漏斗（本插件不提供破坏漏斗功能，保证不误删玩家设施）

# ---------------------------------------------------------------------
# 刷怪限制
# ---------------------------------------------------------------------
spawn-limiter:
  enabled: true
  # 仅在服务器卡顿时限制刷怪
  only-when-lagging: true
  tps-below: 18.0
  max-monsters-per-chunk: 40
  max-animals-per-chunk: 50

# ---------------------------------------------------------------------
# 日志
# ---------------------------------------------------------------------
logging:
  # 输出到控制台
  console: true
  # 输出到插件目录下的 optimizer.log 文件
  file: false
