name: JibaiOptimizer
version: '${version}'
main: me.jibai.optimizer.JibaiOptimizerPlugin
api-version: '1.20'
author: Jibai
description: A cross-core server optimization and performance monitoring plugin for Bukkit / Spigot / Paper / Purpur.

commands:
  optimizer:
    description: Main command for JibaiOptimizer
    usage: /optimizer <status|memory|entities|chunks|clean|redstone|hoppers|reload>
    aliases:
      - joptimizer
      - jopt

permissions:
  jibai.optimizer.admin:
    description: Full access to JibaiOptimizer
    default: op
    children:
      jibai.optimizer.status: true
      jibai.optimizer.memory: true
      jibai.optimizer.entities: true
      jibai.optimizer.chunks: true
      jibai.optimizer.clean: true
      jibai.optimizer.reload: true
      jibai.optimizer.notify: true

  jibai.optimizer.status:
    description: Allows viewing server performance status
    default: op

  jibai.optimizer.memory:
    description: Allows viewing memory status
    default: op

  jibai.optimizer.entities:
    description: Allows viewing entity statistics
    default: op

  jibai.optimizer.chunks:
    description: Allows viewing chunk statistics
    default: op

  jibai.optimizer.clean:
    description: Allows running manual optimization
    default: op

  jibai.optimizer.reload:
    description: Allows reloading configuration
    default: op

  jibai.optimizer.notify:
    description: Allows receiving performance alerts
    default: op
